version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: timesheet_db_prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-timesheet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-timesheet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    # ports direktifi yok — postgres sadece internal network'te erişilebilir
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timesheet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: timesheet_backend_prod
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3001
      NODE_ENV: production
    networks:
      - internal
      - web
    # ports direktifi yok — backend sadece nginx üzerinden /api/ proxy ile erişilebilir

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://92.5.156.75/api}
    container_name: timesheet_frontend_prod
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - web

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  postgres_data:
